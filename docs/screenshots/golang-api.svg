<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="Golang Transaction API preview">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBF7F0"/>
      <stop offset="100%" stop-color="#F4ECDE"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <rect x="24" y="24" width="752" height="452" rx="16" fill="#fff" stroke="#E8DFD0"/>
  <rect x="24" y="24" width="752" height="44" rx="16" fill="#0B2540"/>
  <rect x="24" y="52" width="752" height="16" fill="#0B2540"/>
  <text x="44" y="50" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Golang Transaction API</text>
  <text x="44" y="84" fill="#5B6B73" font-family="system-ui,sans-serif" font-size="11">Idempotent wallet transfers � append-only audit log</text>
  <rect x="44" y="104" width="340" height="200" rx="12" fill="#F8F3EA" stroke="#E8DFD0"/>
  <text x="60" y="128" fill="#0B2540" font-family="monospace" font-size="10" font-weight="600">REST ENDPOINTS</text>
  <text x="60" y="156" fill="#1FA85B" font-family="monospace" font-size="11">GET</text>
  <text x="100" y="156" fill="#0E2A3B" font-family="monospace" font-size="11">/health</text>
  <text x="60" y="180" fill="#0E9E8E" font-family="monospace" font-size="11">POST</text>
  <text x="100" y="180" fill="#0E2A3B" font-family="monospace" font-size="11">/accounts/{id}/deposit</text>
  <text x="60" y="204" fill="#0E9E8E" font-family="monospace" font-size="11">POST</text>
  <text x="100" y="204" fill="#0E2A3B" font-family="monospace" font-size="11">/transfers</text>
  <text x="220" y="204" fill="#F2742C" font-family="monospace" font-size="9">Idempotency-Key</text>
  <text x="60" y="228" fill="#0E9E8E" font-family="monospace" font-size="11">GET</text>
  <text x="100" y="228" fill="#0E2A3B" font-family="monospace" font-size="11">/audit</text>
  <rect x="60" y="248" width="300" height="40" rx="6" fill="#0B2540"/>
  <text x="72" y="272" fill="#1FA85B" font-family="monospace" font-size="9">$ curl -X POST /transfers -H Idempotency-Key: abc-123</text>
  <rect x="404" y="104" width="352" height="200" rx="12" fill="#fff" stroke="#E8DFD0"/>
  <text x="420" y="128" fill="#0B2540" font-family="monospace" font-size="10" font-weight="600">LIVE TRANSFERS</text>
  <rect x="420" y="140" width="320" height="32" rx="6" fill="#F8F3EA"/>
  <text x="432" y="160" fill="#0E2A3B" font-family="monospace" font-size="10">TX-8841 � wallet A � B � 2,500 ETB � OK</text>
  <rect x="420" y="180" width="320" height="32" rx="6" fill="#F8F3EA"/>
  <text x="432" y="200" fill="#0E2A3B" font-family="monospace" font-size="10">TX-8842 � retry blocked � idempotent</text>
  <rect x="420" y="220" width="320" height="32" rx="6" fill="rgba(31,168,91,0.1)"/>
  <text x="432" y="240" fill="#1FA85B" font-family="monospace" font-size="10">TX-8843 � deposit � 10,000 ETB � OK</text>
  <rect x="44" y="324" width="712" height="120" rx="12" fill="#fff" stroke="#0E9E8E" stroke-width="1"/>
  <text x="60" y="348" fill="#0E9E8E" font-family="monospace" font-size="10" font-weight="600">AUDIT LOG</text>
  <text x="60" y="372" fill="#5B6B73" font-family="monospace" font-size="10">2026-06-30T09:12Z transfer created ref=payroll amount=2500</text>
  <text x="60" y="392" fill="#5B6B73" font-family="monospace" font-size="10">2026-06-30T09:12Z idempotency hit key=abc-123 (no duplicate)</text>
  <text x="60" y="412" fill="#5B6B73" font-family="monospace" font-size="10">2026-06-30T09:15Z balance snapshot account=wallet-a</text>
  <rect x="44" y="456" width="100" height="24" rx="12" fill="#0E9E8E"/>
  <text x="56" y="472" fill="#fff" font-family="monospace" font-size="9">10 tests</text>
  <rect x="152" y="456" width="80" height="24" rx="12" fill="#F8F3EA" stroke="#0B2540"/>
  <text x="164" y="472" fill="#0B2540" font-family="monospace" font-size="9">Go � PG</text>
</svg>
