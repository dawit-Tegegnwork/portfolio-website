<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="Firebase emulator demo placeholder">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="rgba(245,240,232,0.06)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#1a1714"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#grid)"/>
  <rect x="40" y="40" width="720" height="420" rx="16" fill="rgba(232,168,73,0.04)" stroke="rgba(232,168,73,0.18)" stroke-width="1"/>
  <circle cx="68" cy="68" r="8" fill="#ff5f57"/>
  <circle cx="92" cy="68" r="8" fill="#febc2e"/>
  <circle cx="116" cy="68" r="8" fill="#28c840"/>
  <text x="400" y="220" text-anchor="middle" fill="#e8a849" font-family="monospace" font-size="14" letter-spacing="4">FIREBASE EMULATOR</text>
  <text x="400" y="260" text-anchor="middle" fill="#a39e96" font-family="sans-serif" font-size="18">Local demo available</text>
  <text x="400" y="300" text-anchor="middle" fill="#6b6560" font-family="monospace" font-size="13">npm run demo</text>
</svg>
